<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT IPS Kelas 8 - Sistem Peraturan</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.exam-box{
    background:white;
    width:95%;
    max-width:850px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    position:relative;
}
.timer{
    position:absolute;
    top:15px;
    right:20px;
    font-weight:bold;
    color:#e74c3c;
}
.progress{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
}
.question{
    margin:15px 0;
    font-weight:600;
}
.options label{
    display:block;
    margin:6px 0;
    padding:8px;
    background:#f1f2f6;
    border-radius:8px;
    cursor:pointer;
}
textarea,input[type=text]{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:8px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px 0;
}
.prev{background:#95a5a6;color:white;}
.next{background:#3498db;color:white;}
.submit{background:#2ecc71;color:white;width:100%;}
.result{
    margin-top:20px;
    background:#f9f9f9;
    padding:15px;
    border-radius:10px;
    max-height:350px;
    overflow:auto;
}
.correct{color:green;}
.wrong{color:red;}
</style>
</head>

<body>

<div class="exam-box">
<div class="timer">⏳ <span id="time">30:00</span></div>
<div class="progress">Soal <span id="current">1</span> dari 25</div>
<div id="questionContainer"></div>

<button class="prev" onclick="prevQuestion()">← Prev</button>
<button class="next" onclick="nextQuestion()">Next →</button>
<button class="submit" onclick="submitQuiz()">Selesai Ujian</button>

<div id="result" class="result"></div>
</div>

<script>

const questions=[

// 1-15 PG
{type:"pg",q:"Peraturan dibuat untuk ...",options:["Membatasi kebebasan","Menciptakan ketertiban","Menghukum orang","Menambah masalah"],answer:1},

{type:"pg",q:"Contoh peraturan di rumah adalah ...",options:["Datang tepat waktu ke sekolah","Membantu orang tua","Membayar pajak","Menaati UUD"],answer:1},

{type:"pg",q:"Tujuan peraturan di sekolah adalah ...",options:["Menakuti siswa","Menciptakan suasana belajar tertib","Menghukum siswa","Mengurangi pelajaran"],answer:1},

{type:"pg",q:"Tidak membuang sampah sembarangan termasuk peraturan di ...",options:["Rumah","Sekolah","Lingkungan","Negara"],answer:2},

{type:"pg",q:"Tata urutan peraturan berarti ...",options:["Kumpulan aturan","Susunan tingkatan peraturan","Hukuman negara","Hak warga"],answer:1},

{type:"pg",q:"Peraturan tertinggi di Indonesia adalah ...",options:["Perda","UU","UUD 1945","Perpres"],answer:2},

{type:"pg",q:"UU dibuat oleh ...",options:["Presiden saja","DPR dan Presiden","MPR saja","Mahkamah Agung"],answer:1},

{type:"pg",q:"Peraturan Daerah dibuat oleh ...",options:["Presiden","DPR RI","DPRD dan Kepala Daerah","MPR"],answer:2},

{type:"pg",q:"Perppu dibuat dalam keadaan ...",options:["Santai","Darurat","Normal","Sekolah"],answer:1},

{type:"pg",q:"Semakin tinggi posisi peraturan maka ...",options:["Semakin lemah","Semakin kecil","Semakin kuat","Semakin rendah"],answer:2},

{type:"pg",q:"Contoh sikap menaati peraturan sekolah adalah ...",options:["Datang terlambat","Memakai seragam sesuai aturan","Menyontek","Tidak mengerjakan tugas"],answer:1},

{type:"pg",q:"Manfaat adanya tata urutan hukum adalah ...",options:["Mencegah konflik aturan","Menambah aturan","Menghapus hukum","Menyulitkan warga"],answer:0},

{type:"pg",q:"TAP MPR berada di bawah ...",options:["Perda","UUD 1945","Perpres","PP"],answer:1},

{type:"pg",q:"Perpres dibuat oleh ...",options:["DPR","MPR","Presiden","Mahkamah"],answer:2},

{type:"pg",q:"Jika peraturan bertentangan dengan UUD maka ...",options:["Tetap berlaku","Harus dibatalkan","Dibiarkan","Diperbanyak"],answer:1},

// 16-20 Benar Salah
{type:"bs",q:"UUD 1945 adalah hukum tertinggi di Indonesia.",answer:true},
{type:"bs",q:"Perda lebih tinggi dari UU.",answer:false},
{type:"bs",q:"Peraturan dibuat agar kehidupan tertib.",answer:true},
{type:"bs",q:"Perppu dibuat oleh DPR.",answer:false},
{type:"bs",q:"Semua peraturan harus sesuai dengan UUD.",answer:true},

// 21-23 Isian
{type:"isian",q:"Peraturan tertinggi di Indonesia adalah ...",answer:"uud"},
{type:"isian",q:"Peraturan daerah disebut juga ...",answer:"perda"},
{type:"isian",q:"Susunan tingkatan peraturan disebut ...",answer:"tata urutan"},

// 24-25 Essay
{type:"essay",q:"Jelaskan pentingnya menaati peraturan di lingkungan sekolah!"},
{type:"essay",q:"Jelaskan piramida tata urutan peraturan perundang-undangan di Indonesia!"}

];

let currentQuestion=0;
let userAnswers=new Array(questions.length).fill(null);

function loadQuestion(){
document.getElementById("current").textContent=currentQuestion+1;
let q=questions[currentQuestion];
let html=`<div class="question">${q.q}</div>`;

if(q.type==="pg"){
q.options.forEach((opt,i)=>{
html+=`<label><input type="radio" onclick="saveAnswer(${i})"> ${opt}</label>`;
});
}

if(q.type==="bs"){
html+=`<label><input type="radio" onclick="saveAnswer(true)"> Benar</label>`;
html+=`<label><input type="radio" onclick="saveAnswer(false)"> Salah</label>`;
}

if(q.type==="isian"){
html+=`<input type="text" oninput="saveAnswer(this.value)">`;
}

if(q.type==="essay"){
html+=`<textarea oninput="saveAnswer(this.value)"></textarea>`;
}

document.getElementById("questionContainer").innerHTML=html;
}

function saveAnswer(val){ userAnswers[currentQuestion]=val; }

function nextQuestion(){ if(currentQuestion<questions.length-1){currentQuestion++;loadQuestion();}}
function prevQuestion(){ if(currentQuestion>0){currentQuestion--;loadQuestion();}}

function submitQuiz(){
let score=0;
let autoTotal=23;

questions.forEach((q,i)=>{
if(q.type==="pg"||q.type==="bs"){
if(userAnswers[i]==q.answer)score++;
}
if(q.type==="isian"){
if((userAnswers[i]||"").toLowerCase().includes(q.answer))score++;
}
});

let nilai=Math.round((score/autoTotal)*100);

document.getElementById("result").innerHTML=
`<h2>Nilai Otomatis: ${nilai}</h2>
<p>Essay dinilai manual oleh guru.</p>
<h3>Ringkasan Materi:</h3>
Peraturan dibuat untuk menciptakan ketertiban.
Tata urutan hukum mengatur tingkatan peraturan dari UUD 1945 hingga Perda.
Semua peraturan harus sesuai dengan UUD 1945 sebagai hukum tertinggi.
`;
}

loadQuestion();

/* TIMER */
let totalTime=1800;
let timeLeft=totalTime;
let timerDisplay=document.getElementById("time");

let timer=setInterval(function(){
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
timerDisplay.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
timeLeft--;
if(timeLeft<0){
clearInterval(timer);
submitQuiz();
}
},1000);

</script>

</body>
</html>
